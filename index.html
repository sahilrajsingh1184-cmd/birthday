<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:#f5f5f5;
    overflow:hidden;
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

h1{
    font-size:72px;
    color:#000;
    letter-spacing:2px;
    transform:scale(0.7);
    opacity:0;
    transition:0.6s ease;
}

button{
    margin-top:40px;
    padding:14px 36px;
    font-size:18px;
    background:#000;
    color:#fff;
    border:none;
    border-radius:40px;
    cursor:pointer;
    transition:0.3s ease;
}

button:hover{
    transform:scale(1.08);
}

/* Canvas full screen */
canvas{
    position:absolute;
    top:0;
    left:0;
}
</style>
</head>

<body>

<h1 id="title">Happy Holi</h1>
<button onclick="startCelebration()">Celebrate</button>

<audio id="music" loop>
    <source src="holi.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let animationRunning = false;

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = Math.random() * 6 + 2;
        this.radius = 4;
        this.life = 100;
    }

    update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.speed *= 0.96;
        this.life--;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

function createFirework(x, y) {
    const colors = ["#ff003c","#ff8c00","#00c3ff","#00ff88","#9d00ff"];
    for(let i = 0; i < 120; i++){
        particles.push(new Particle(x, y, colors[Math.floor(Math.random()*colors.length)]));
    }
}

function animate() {
    ctx.fillStyle = "rgba(245,245,245,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p, index) => {
        p.update();
        p.draw();
        if(p.life <= 0){
            particles.splice(index,1);
        }
    });

    if(animationRunning) requestAnimationFrame(animate);
}

function startCelebration(){
    document.querySelector("button").style.display="none";

    const title = document.getElementById("title");
    title.style.opacity = "1";
    title.style.transform = "scale(1)";

    document.getElementById("music").play();

    animationRunning = true;
    animate();

    const interval = setInterval(()=>{
        createFirework(Math.random()*canvas.width, Math.random()*canvas.height);
    },700);

    setTimeout(()=>{
        clearInterval(interval);
    },9000);
}
</script>

</body>
</html>
