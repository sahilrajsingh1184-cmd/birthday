<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(-45deg, red, yellow, blue, green, purple);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

h1 {
    font-size: 60px;
    color: white;
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
}

.glow {
    animation: glowText 2s ease-in-out infinite alternate;
}

@keyframes glowText {
    from { text-shadow: 0 0 10px white, 0 0 20px pink; }
    to { text-shadow: 0 0 30px yellow, 0 0 50px orange; }
}

button {
    padding: 15px 30px;
    font-size: 20px;
    border: none;
    background: #ff4081;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: 0.3s;
}

button:hover {
    transform: translate(-50%, -50%) scale(1.1);
}

.gulal {
    position: absolute;
    width: 15px;
    height: 15px;
    border-radius: 50%;
    opacity: 0.8;
    animation: floatBlast 3s ease-out forwards;
}

@keyframes floatBlast {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(3); opacity: 0; }
}

.endAnimation {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, yellow, red, blue, green);
    animation: grandZoom 4s ease forwards;
}

@keyframes grandZoom {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<h1 id="wishText">🌈 Happy Holi 🌈</h1>
<button onclick="startHoli()">Celebrate Now 🎉</button>

<!-- 🎵 Background Music -->
<audio id="bgMusic" loop>
    <source src="holi.mp3" type="audio/mpeg">
</audio>

<script>
function startHoli() {

    document.querySelector("button").style.display = "none";

    // Play Music
    document.getElementById("bgMusic").play();

    let text = document.getElementById("wishText");
    text.style.opacity = "1";
    text.classList.add("glow");

    // Gulal Effect
    for (let i = 0; i < 150; i++) {
        let gulal = document.createElement("div");
        gulal.className = "gulal";

        gulal.style.background = randomColor();
        gulal.style.left = "50%";
        gulal.style.top = "50%";

        gulal.style.setProperty('--x', (Math.random() - 0.5) * 1200 + "px");
        gulal.style.setProperty('--y', (Math.random() - 0.5) * 800 + "px");

        document.body.appendChild(gulal);

        setTimeout(() => gulal.remove(), 3000);
    }

    setTimeout(() => {
        let endDiv = document.createElement("div");
        endDiv.className = "endAnimation";
        document.body.appendChild(endDiv);

        let endText = document.createElement("h1");
        endText.innerHTML = "✨ Celebrate With Colors & Joy ✨";
        endText.style.opacity = "1";
        endText.classList.add("glow");
        document.body.appendChild(endText);

    }, 3500);
}

function randomColor() {
    let colors = ["red", "yellow", "blue", "green", "purple", "orange", "pink"];
    return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
