<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi</title>

<!-- Premium Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Lobster&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at center, #111 20%, #000 80%);
    text-align: center;
    color: white;
}

/* Animated Background Glow */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: conic-gradient(red, yellow, blue, green, purple, red);
    animation: rotateBG 15s linear infinite;
    opacity: 0.15;
}
@keyframes rotateBG {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Title Styling */
h1 {
    font-family: 'Lobster', cursive;
    font-size: 70px;
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    text-shadow: 0 0 20px #ff0080, 0 0 40px #ffea00;
    transition: 0.6s ease;
}

/* Button */
button {
    padding: 15px 35px;
    font-size: 20px;
    border: none;
    background: linear-gradient(45deg, #ff0080, #ffea00);
    color: black;
    border-radius: 50px;
    cursor: pointer;
    position: absolute;
    top: 65%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-weight: bold;
    transition: 0.3s;
}
button:hover {
    transform: translate(-50%, -50%) scale(1.1);
}

/* Gulal Firework Particles */
.particle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
}

@keyframes explode {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(2); opacity: 0; }
}

/* Final Glow Ending */
.finalMessage {
    position: absolute;
    top: 75%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    opacity: 0;
    transition: 1s;
}
</style>
</head>

<body>

<h1 id="title">🌈 Happy Holi Sahil 🌈</h1>
<button onclick="startCelebration()">Celebrate 🎉</button>

<audio id="music" loop>
    <source src="holi.mp3" type="audio/mpeg">
</audio>

<script>
function startCelebration() {

    document.querySelector("button").style.display = "none";
    document.getElementById("music").play();

    let title = document.getElementById("title");
    title.style.transform = "translate(-50%, -50%) scale(1)";

    // Continuous Firework Gulal
    let interval = setInterval(createFirework, 800);

    // Stop after 8 seconds
    setTimeout(() => {
        clearInterval(interval);
        showFinalMessage();
    }, 8000);
}

function createFirework() {

    let centerX = Math.random() * window.innerWidth;
    let centerY = Math.random() * window.innerHeight;

    for (let i = 0; i < 80; i++) {

        let particle = document.createElement("div");
        particle.className = "particle";
        particle.style.background = randomColor();

        particle.style.left = centerX + "px";
        particle.style.top = centerY + "px";

        let angle = Math.random() * 2 * Math.PI;
        let distance = Math.random() * 300;

        let x = Math.cos(angle) * distance + "px";
        let y = Math.sin(angle) * distance + "px";

        particle.style.setProperty('--x', x);
        particle.style.setProperty('--y', y);
        particle.style.animation = "explode 2s ease-out forwards";

        document.body.appendChild(particle);

        setTimeout(() => particle.remove(), 2000);
    }
}

function showFinalMessage() {
    let msg = document.createElement("div");
    msg.className = "finalMessage";
    msg.innerHTML = "✨ Celebrate Colors, Joy & Happiness ✨";
    document.body.appendChild(msg);

    setTimeout(() => {
        msg.style.opacity = "1";
    }, 200);
}

function randomColor() {
    let colors = ["#ff0080", "#ffea00", "#00f2ff", "#00ff88", "#ff3c00", "#9d00ff"];
    return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
